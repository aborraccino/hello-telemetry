services:
  ht-mysql:
    image: mysql:latest
    container_name: ht-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - ht_network

  ht-tomcat:
    container_name: ht-tomcat
    build:
      context: ./tomcat
    ports:
      - "${TOMCAT_PORT}:8080"
      - "${JMX_PORT}:9010"
      - "${JMX_RMI_PORT}:1099"
    environment:
      - JAVA_OPTS=-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=${JMX_PORT} -Dcom.sun.management.jmxremote.rmi.port=${JMX_RMI_PORT} -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost
    depends_on:
      - ht-mysql
      - ht-python-service
    networks:
      - ht_network

  ht-python-service:
    container_name: ht-python-service
    build:
      context: ./python-service
    ports:
      - "${PYTHON_PORT}:5000"
    networks:
      - ht_network

  ht-otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ht-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "${OTEL_PPROF_PORT}:1888"         # pprof extension
      - "${OTEL_PROMETHEUS_PORT}:8888"     # Prometheus metrics exposed by the Collector
      - "${OTEL_PROMETHEUS_EXPORTER_PORT}:8889" # Prometheus exporter metrics
      - "${OTEL_HEALTH_PORT}:13133"        # health_check extension
      - "${OTLP_GRPC_PORT}:4317"           # OTLP gRPC receiver
      - "${OTLP_HTTP_PORT}:4318"           # OTLP http receiver
      - "${OTEL_ZPAGES_PORT}:55679"        # zpages extension
    networks:
      - ht_network

  ht-jaeger:
    container_name: ht-jaeger
    image: jaegertracing/all-in-one:latest
    ports:
      - "${JAEGER_COMPACT_PORT}:6831/udp"
      - "${JAEGER_BINARY_PORT}:6832/udp"
      - "${JAEGER_CONFIGS_PORT}:5778"
      - "${JAEGER_UI_PORT}:16686"
      - "${JAEGER_GRPC_PORT}:14250"
      - "${JAEGER_HTTP_PORT}:14268"
      - "${JAEGER_ADMIN_PORT}:14269"
      - "${JAEGER_ZIPKIN_PORT}:9411"
    networks:
      - ht_network

volumes:
  mysql_data:


networks:
  ht_network:
